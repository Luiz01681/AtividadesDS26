<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Consumo de APIs</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .container { margin-bottom: 30px; border: 1px solid #ccc; padding: 15px; width: 300px; }
  </style>
</head>
<body>

  <div class="container">
    <h2>JSONPlaceholder</h2>
    <button onclick="buscarDados1()">Buscar Usuário</button>
    <div id="resultado1"></div>
  </div>

  <div class="container">
    <h2>Rick and Morty API</h2>
    <button onclick="buscarDados2()">Buscar Personagem</button>
    <div id="resultado2"></div>
  </div>

  <div class="container">
    <h2>Random User API</h2>
    <button onclick="buscarDados3()">Buscar Aleatório</button>
    <div id="resultado3"></div>
  </div>

  <script>
    function buscarDados1() {
      fetch('https://jsonplaceholder.typicode.com/users/1')
        .then(res => res.json())
        .then(data => {
          document.getElementById('resultado1').innerHTML = `
            <p><strong>Nome:</strong> ${data.name}</p>
            <p><strong>Email:</strong> ${data.email}</p>
            <p><strong>Cidade:</strong> ${data.address.city}</p>
          `;
        })
        .catch(error => console.log(error));
    }

    function buscarDados2() {
      fetch('https://rickandmortyapi.com/api/character/1')
        .then(res => res.json())
        .then(data => {
          document.getElementById('resultado2').innerHTML = `
            <p><strong>Nome:</strong> ${data.name}</p>
            <p><strong>Espécie:</strong> ${data.species}</p>
            <p><strong>Status:</strong> ${data.status}</p>
          `;
        })
        .catch(error => console.log(error));
    }

    function buscarDados3() {
      fetch('https://randomuser.me/api/')
        .then(res => res.json())
        .then(data => {
          const user = data.results[0];
          document.getElementById('resultado3').innerHTML = `
            <p><strong>Nome:</strong> ${user.name.first} ${user.name.last}</p>
            <p><strong>País:</strong> ${user.location.country}</p>
            <p><strong>Idade:</strong> ${user.dob.age}</p>
          `;
        })
        .catch(error => console.log(error));
    }
  </script>

</body>
</html>
