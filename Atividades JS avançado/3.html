<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Ex 3 - Calculadora</title>
</head>
<body>
    <h2>Calculadora da Oficina</h2>
    <input type="number" id="num1" placeholder="Valor 1">
    
    <select id="operacao">
        <option value="+">+</option>
        <option value="-">-</option>
        <option value="*">*</option>
        <option value="/">/</option>
    </select>

    <input type="number" id="num2" placeholder="Valor 2">
    <button onclick="calcular()">Calcular</button>
    
    <h3 id="resultado-calc">Resultado: </h3>

    <script>
        function calcular() {
            let n1 = Number(document.getElementById("num1").value);
            let n2 = Number(document.getElementById("num2").value);
            let op = document.getElementById("operacao").value;
            let resultado = 0;

            if (op === "+") resultado = n1 + n2;
            else if (op === "-") resultado = n1 - n2;
            else if (op === "*") resultado = n1 * n2;
            else if (op === "/") {
                if(n2 === 0) return alert("Não é possível dividir por zero!");
                resultado = n1 / n2;
            }

            document.getElementById("resultado-calc").innerText = "Resultado: " + resultado;
        }
    </script>
</body>
</html>
